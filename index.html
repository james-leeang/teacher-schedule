<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="课程管理">
  <title>英语老师课程管理</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="header-title">课程管理</h1>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="btn-theme-toggle" aria-label="切换主题" style="background:transparent;border:none;color:#fff;font-size:18px;cursor:pointer;padding:6px;">🌓</button>
        <button id="add-btn" aria-label="添加课程">+</button>
      </div>
    </header>

    <main id="main-content">
      <!-- 列表视图 -->
      <section id="list-view" class="view active">
        <div class="filter-bar">
          <select id="status-filter">
            <option value="all">全部状态</option>
            <option value="pending">待上课</option>
            <option value="completed">已完成</option>
            <option value="cancelled">已取消</option>
          </select>
          <select id="sort-order">
            <option value="asc">时间升序</option>
            <option value="desc">时间降序</option>
          </select>
        </div>
        <div id="course-list" class="course-list"></div>
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">📝</div>
          <p>还没有课程记录</p>
          <p>点击右上角 + 添加课程</p>
        </div>
      </section>

      <!-- 日历视图 -->
      <section id="calendar-view" class="view">
        <div class="calendar-nav">
          <button id="cal-prev" aria-label="上个月">&lt;</button>
          <span id="cal-month-label"></span>
          <button id="cal-next" aria-label="下个月">&gt;</button>
          <button id="cal-today" class="btn-today">今天</button>
        </div>
        <div class="view-toggle">
          <button id="view-month-btn" class="view-toggle-btn active">月视图</button>
          <button id="view-week-btn" class="view-toggle-btn">周视图</button>
        </div>
        <div id="month-view">
          <div class="calendar-weekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div id="week-view" style="display:none;">
          <div class="timetable-wrapper">
            <div class="timetable-header" id="timetable-header"></div>
            <div class="timetable-scroll">
              <div class="timetable-body" id="timetable-body"></div>
            </div>
          </div>
        </div>
        <div id="day-courses" class="day-courses">
          <h3 id="day-courses-title">选择日期查看课程</h3>
          <div id="day-courses-list"></div>
        </div>
      </section>

      <!-- 统计视图 -->
      <section id="stats-view" class="view">
        <div class="stats-cards">
          <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">总课程数</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">已完成</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">待上课</div>
          </div>
          <div class="stat-card highlight">
            <div class="stat-value" id="stat-income">¥0</div>
            <div class="stat-label">总收入</div>
          </div>
        </div>
        <div class="stats-chart-section">
          <h3>本月概览</h3>
          <div class="stats-row">
            <span>本月课程</span>
            <span id="stat-month-courses">0</span>
          </div>
          <div class="stats-row">
            <span>本月计划收入</span>
            <span id="stat-month-planned-income">¥0</span>
          </div>
          <div class="stats-row">
            <span>本月实际收入</span>
            <span id="stat-month-actual-income">¥0</span>
          </div>
          <div class="stats-row">
            <span>本月课时</span>
            <span id="stat-month-hours">0小时</span>
          </div>
        </div>
        <div class="stats-chart-section">
          <h3>本月趋势</h3>
          <canvas id="stats-chart" style="width:100%;max-height:180px"></canvas>
        </div>
        <div class="stats-chart-section">
          <h3>历史月度统计</h3>
          <div id="monthly-breakdown"></div>
        </div>
        <div class="stats-chart-section">
          <h3>数据管理</h3>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button id="btn-export-data" class="btn btn-secondary" style="flex:1;">📤 导出备份</button>
            <button id="btn-import-data" class="btn btn-secondary" style="flex:1;">📥 导入备份</button>
            <input type="file" id="file-import" accept="application/json,.json" style="display:none;">
          </div>
          <p style="font-size:12px;color:var(--text-secondary);margin-top:8px;line-height:1.5;">
            导出会把全部学生和课程保存为 JSON 文件，可以发到微信/邮箱保存。<br>
            换手机或重装 App 后，用导入功能恢复全部数据。
          </p>
        </div>
      </section>

      <!-- 学生视图 -->
      <section id="student-view" class="view">
        <div id="student-list" class="student-list"></div>
        <div id="student-empty" class="empty-state">
          <div class="empty-icon">👨‍🎓</div>
          <p>还没有添加学生</p>
          <p>点击右上角 + 添加学生</p>
        </div>
      </section>

      <!-- 学生课程视图 -->
      <section id="student-course-view" class="view">
        <div class="student-course-header">
          <button id="student-back-btn" class="back-btn">&lt; 返回学生列表</button>
          <h3 id="student-course-title"></h3>
        </div>
        <div id="student-course-list"></div>
      </section>
    </main>

    <nav id="tab-bar">
      <button class="tab active" data-view="list">
        <span class="tab-icon">📋</span>
        <span class="tab-label">课程</span>
      </button>
      <button class="tab" data-view="calendar">
        <span class="tab-icon">📅</span>
        <span class="tab-label">日历</span>
      </button>
      <button class="tab" data-view="stats">
        <span class="tab-icon">📊</span>
        <span class="tab-label">统计</span>
      </button>
      <button class="tab" data-view="student">
        <span class="tab-icon">👨‍🎓</span>
        <span class="tab-label">学生</span>
      </button>
    </nav>
  </div>

  <!-- 课程表单弹窗 -->
  <div id="course-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">添加课程</h2>
        <button class="modal-close" aria-label="关闭">&times;</button>
      </div>
      <form id="course-form">
        <input type="hidden" id="course-id">
        <div class="form-group">
          <label for="student-name">选择学生 *</label>
          <select id="student-name" required>
            <option value="">-- 请先添加学生 --</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="course-date">上课日期 *</label>
            <input type="date" id="course-date" required>
          </div>
          <div class="form-group">
            <label for="course-time">上课时间 *</label>
            <input type="time" id="course-time" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="course-duration">课程时长(分钟) *</label>
            <input type="number" id="course-duration" value="60" min="15" step="5" required>
          </div>
          <div class="form-group">
            <label for="course-fee">课程费用（元）<span class="auto-hint">自动：70元/小时</span></label>
            <input type="number" id="course-fee" value="70" min="0" step="0.01" readonly style="background:#f0f0f0;">
          </div>
        </div>
        <div class="form-group">
          <label for="course-status">课程状态</label>
          <select id="course-status">
            <option value="pending">待上课</option>
            <option value="completed">已完成</option>
            <option value="cancelled">已取消</option>
          </select>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="course-recurring">
            <span>每周重复课程</span>
          </label>
          <div id="recurring-options" style="display:none; margin-top: 8px;">
            <label for="course-repeat-weeks">重复周数</label>
            <input type="number" id="course-repeat-weeks" value="4" min="1" max="52" step="1" style="width:80px;">
            <span class="auto-hint" style="margin-left: 8px;">从选定日期开始，每周同一时间</span>
          </div>
        </div>
        <div class="form-group">
          <label for="course-notes">备注</label>
          <textarea id="course-notes" rows="3" placeholder="添加备注信息..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" id="btn-save" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 学生表单弹窗 -->
  <div id="student-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="student-modal-title">添加学生</h2>
        <button class="modal-close" aria-label="关闭">&times;</button>
      </div>
      <form id="student-form">
        <input type="hidden" id="student-id">
        <div class="form-group">
          <label for="student-name-input">学生姓名 *</label>
          <input type="text" id="student-name-input" required placeholder="输入学生姓名" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="student-phone">电话</label>
          <input type="tel" id="student-phone" placeholder="输入电话号码">
        </div>
        <div class="form-group">
          <label for="student-notes-input">备注</label>
          <textarea id="student-notes-input" rows="2" placeholder="添加备注信息..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="student-btn-cancel" class="btn btn-secondary">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 日期课程详情弹窗 -->
  <div id="day-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="day-modal-title"></h2>
        <button class="modal-close day-modal-close" aria-label="关闭">&times;</button>
      </div>
      <div id="day-modal-list"></div>
    </div>
  </div>

  <!-- BottomSheet 选择器 -->
  <div id="bottomsheet" class="bottomsheet">
    <div class="bs-backdrop"></div>
    <div class="bs-content">
      <div class="bs-header">
        <span class="bs-title">请选择</span>
        <button class="bs-done">完成</button>
      </div>
      <div class="bs-options"></div>
    </div>
  </div>

  <!-- 自定义确认弹窗 -->
  <div id="confirm-dialog" class="bottomsheet">
    <div class="bs-backdrop" id="confirm-backdrop"></div>
    <div class="bs-content" style="padding:20px;text-align:center;">
      <p id="confirm-msg" style="font-size:15px;margin-bottom:20px;line-height:1.6;"></p>
      <div class="form-actions" style="border:none;padding:0;">
        <button id="confirm-cancel" class="btn btn-secondary">取消</button>
        <button id="confirm-ok" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>

  <!-- Toast 消息 -->
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
