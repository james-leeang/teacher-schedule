name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm deps
        run: npm install

      - name: Mirror root source to www/ (in case dev edited root files)
        run: |
          # 容错：如果开发者改的是根目录的 index.html / js / css，
          # 这里把它们镜像到 www/，再交给 cap sync 推到 android
          cp -f index.html www/index.html 2>/dev/null || true
          cp -rf js/. www/js/ 2>/dev/null || true
          cp -rf css/. www/css/ 2>/dev/null || true
          cp -f manifest.json www/manifest.json 2>/dev/null || true
          cp -f sw.js www/sw.js 2>/dev/null || true

      - name: Sync www to android (Capacitor)
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-36 build-tools;36.0.0'
          cache: true

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
